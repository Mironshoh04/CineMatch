services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models
      - ./data:/data
    env_file:
      - .env
    environment:
      - MODEL_PATH=/models/als_model.pkl

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=
    ports:
      - "5173:5173"
    depends_on:
      - backend
